<!DOCTYPE html>
<html lang="en">
    <head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Material Stats</title>
	<link rel="stylesheet" href="stats.css" />
    </head>
    <body>
	<main class="stats-page">
	    <section class="stats" aria-label="Company highlights">
		<article class="stats__card" tabindex="0">
		    <strong class="stats__number">20K+</strong>
		    <span class="stats__label">Students Trained</span>
		</article>

		<article class="stats__card" tabindex="0">
		    <strong class="stats__number">95%</strong>
		    <span class="stats__label">Job Placement</span>
		</article>

		<article class="stats__card" tabindex="0">
		    <strong class="stats__number">10+</strong>
		    <span class="stats__label">Years of Experience</span>
		</article>
	    </section>
	</main>
    </body>
</html>
